version: '3.8'

services:
  api:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    command: node dist/index.js
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    env_file:
      - ./backend/.env
    command: node dist/workers/generationWorker.js
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
